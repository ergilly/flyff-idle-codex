info:
  name: Transfer bank Penya
  type: http
  seq: 4
  tags:
    - Bank

http:
  method: POST
  url: "{{baseUrl}}/api/characters/:characterId/bank/penya"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "direction": "deposit",
        "amount": 1
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("transfers Penya and returns both balances", function() {
          expect(res.status).to.equal(200);
          expect(res.body.bank.penya).to.be.a("number");
          expect(res.body.character.penya).to.be.a("number");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
