info:
  name: Get indexed item metadata by ids
  type: http
  seq: 1
  tags:
    - Items

http:
  method: GET
  url: "{{baseUrl}}/api/items"
  params:
    - name: ids
      value: 40,3497,3314
      type: query
      description: Comma-separated numeric item ids. At most 50 ids per request.
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns metadata for the requested item ids", function() {
          expect(res.status).to.equal(200);
          expect(res.body.items).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Item metadata
    request:
      url: "{{baseUrl}}/api/items"
      method: GET
      params:
        - name: ids
          value: 40,3497,3314
          type: query
          description: Comma-separated numeric item ids. At most 50 ids per request.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "items": [
              {
                "id": "",
                "name": "",
                "description": "",
                "icon": "",
                "category": "",
                "subcategory": "",
                "rarity": "",
                "level": 0,
                "sex": "",
                "requiredJob": "",
                "minAttack": 0,
                "maxAttack": 0,
                "attackSpeed": "",
                "twoHanded": false,
                "minDefense": 0,
                "maxDefense": 0,
                "abilities": [
                  {
                    "parameter": "",
                    "add": 0,
                    "rate": false
                  }
                ]
              }
            ]
          }
  - name: 400 Response
    description: Invalid request body or parameters
    request:
      url: "{{baseUrl}}/api/items"
      method: GET
      params:
        - name: ids
          value: 40,3497,3314
          type: query
          description: Comma-separated numeric item ids. At most 50 ids per request.
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 401 Response
    description: Missing or invalid bearer token, or invalid credentials
    request:
      url: "{{baseUrl}}/api/items"
      method: GET
      params:
        - name: ids
          value: 40,3497,3314
          type: query
          description: Comma-separated numeric item ids. At most 50 ids per request.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
