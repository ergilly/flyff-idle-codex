info:
  name: List JSON-backed data sets
  type: http
  seq: 1
  tags:
    - Game_Data

http:
  method: GET
  url: "{{baseUrl}}/api/data"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Available JSON data sets
    request:
      url: "{{baseUrl}}/api/data"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "dataSets": [
              {
                "name": "items",
                "href": "/api/data/skills"
              }
            ]
          }
