info:
  name: Get a JSON-backed data record by id
  type: http
  seq: 3
  tags:
    - Game_Data

http:
  method: GET
  url: "{{baseUrl}}/api/data/:dataSet/:id"
  params:
    - name: dataSet
      value: items
      type: path
    - name: dataSet
      value: jobs
      type: path
      disabled: true
    - name: dataSet
      value: mapMonsters
      type: path
      disabled: true
    - name: dataSet
      value: monsters
      type: path
      disabled: true
    - name: dataSet
      value: sets
      type: path
      disabled: true
    - name: dataSet
      value: skills
      type: path
      disabled: true
    - name: dataSet
      value: upgrades
      type: path
      disabled: true
    - name: id
      value: ""
      type: path
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns one game-data record", function() {
          expect(res.status).to.equal(200);
          expect(res.body.item).to.be.an("object");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Data record
    request:
      url: "{{baseUrl}}/api/data/:dataSet/:id"
      method: GET
      params:
        - name: dataSet
          value: items
          type: path
        - name: dataSet
          value: jobs
          type: path
          disabled: true
        - name: dataSet
          value: mapMonsters
          type: path
          disabled: true
        - name: dataSet
          value: monsters
          type: path
          disabled: true
        - name: dataSet
          value: sets
          type: path
          disabled: true
        - name: dataSet
          value: skills
          type: path
          disabled: true
        - name: dataSet
          value: upgrades
          type: path
          disabled: true
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "dataSet": "items",
            "item": {}
          }
  - name: 404 Response
    description: Requested resource was not found
    request:
      url: "{{baseUrl}}/api/data/:dataSet/:id"
      method: GET
      params:
        - name: dataSet
          value: items
          type: path
        - name: dataSet
          value: jobs
          type: path
          disabled: true
        - name: dataSet
          value: mapMonsters
          type: path
          disabled: true
        - name: dataSet
          value: monsters
          type: path
          disabled: true
        - name: dataSet
          value: sets
          type: path
          disabled: true
        - name: dataSet
          value: skills
          type: path
          disabled: true
        - name: dataSet
          value: upgrades
          type: path
          disabled: true
        - name: id
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
