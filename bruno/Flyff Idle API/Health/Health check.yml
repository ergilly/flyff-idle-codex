info:
  name: Health check
  type: http
  seq: 1
  tags:
    - Health

http:
  method: GET
  url: "{{baseUrl}}/health"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns a healthy API status", function() {
          expect(res.status).to.equal(200);
          expect(res.body.status).to.equal("ok");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: API status
    request:
      url: "{{baseUrl}}/health"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "status": "ok"
          }
