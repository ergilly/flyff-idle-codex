info:
  name: Add an item stack to a character inventory
  type: http
  seq: 3
  tags:
    - Admin

http:
  method: POST
  url: "{{baseUrl}}/api/admin/characters/:characterId/inventory"
  params:
    - name: characterId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "itemId": "40",
        "quantity": 1
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

