info:
  name: Travel a character
  type: http
  seq: 1
  tags:
    - Travel

http:
  method: POST
  url: "{{baseUrl}}/api/characters/:characterId/travel"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "destination": "flaris",
        "method": "flying",
        "equipmentSet": 0
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns the character at the destination", function() {
          expect(res.status).to.equal(200);
          expect(res.body.character.location).to.be.a("string");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
