info:
  name: Get a character
  type: http
  seq: 3
  tags:
    - Characters

http:
  method: GET
  url: "{{baseUrl}}/api/characters/:characterId"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns the requested owned character", function() {
          expect(res.status).to.equal(200);
          expect(res.body.character).to.be.an("object");
          expect(res.body.character.id).to.be.a("string").and.not.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
