info:
  name: Replace character battle state
  type: http
  seq: 7
  tags:
    - Characters

http:
  method: PUT
  url: "{{baseUrl}}/api/characters/:characterId/progression/battle-state"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "exp": 0,
        "level": 1,
        "penya": 0
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns the complete persisted character state", function() {
          expect(res.status).to.equal(200);
          expect(res.body.character).to.be.an("object");
          expect(res.body.character.level).to.be.a("number");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
