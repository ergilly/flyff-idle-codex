info:
  name: Create a character in an open roster slot
  type: http
  seq: 2
  tags:
    - Characters

http:
  method: POST
  url: "{{baseUrl}}/api/characters"
  body:
    type: json
    data: |-
      {
        "slotIndex": 2,
        "name": "FlarisHero",
        "gender": "male"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 201 && res.body.character) {
          bru.setEnvVar("characterId", res.body.character.id, { persist: true });
          bru.setEnvVar("characterName", res.body.character.name, { persist: true });
        }
    - type: tests
      code: |-
        test("creates and returns the authoritative character", function() {
          expect(res.status).to.equal(201);
          expect(res.body.character).to.be.an("object");
          expect(res.body.character.id).to.be.a("string").and.not.empty;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Created character
    request:
      url: "{{baseUrl}}/api/characters"
      method: POST
      body:
        type: json
