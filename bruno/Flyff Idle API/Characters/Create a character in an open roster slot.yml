  - name: 400 Response
    description: Invalid request body or parameters
    request:
      url: "{{baseUrl}}/api/characters"
      method: POST
      body:
        type: json
        data: |-
          {
            "slotIndex": 2,
            "name": "FlarisHero",
            "gender": "male"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 401 Response
    description: Missing or invalid bearer token, or invalid credentials
    request:
      url: "{{baseUrl}}/api/characters"
      method: POST
      body:
        type: json
        data: |-
          {
            "slotIndex": 2,
            "name": "FlarisHero",
            "gender": "male"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
