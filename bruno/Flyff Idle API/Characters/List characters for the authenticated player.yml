  - name: 401 Response
    description: Missing or invalid bearer token, or invalid credentials
    request:
      url: "{{baseUrl}}/api/characters"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
