info:
  name: List characters for the authenticated player
  type: http
  seq: 1
  tags:
    - Characters

http:
  method: GET
  url: "{{baseUrl}}/api/characters"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Character roster
    request:
      url: "{{baseUrl}}/api/characters"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
