info:
  name: Allocate character stat points
  type: http
  seq: 5
  tags:
    - Characters

http:
  method: POST
  url: "{{baseUrl}}/api/characters/:characterId/progression/stat-allocations"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "allocations": { "str": 1, "sta": 0, "dex": 0, "int": 0 }
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns the character with allocated stats", function() {
          expect(res.status).to.equal(200);
          expect(res.body.character.stats).to.be.an("object");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
