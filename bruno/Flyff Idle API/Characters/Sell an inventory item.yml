info:
  name: Sell an inventory item
  type: http
  seq: 18
  tags:
    - Characters

http:
  method: POST
  url: "{{baseUrl}}/api/characters/:characterId/shops/sales"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "slotIndex": 0,
        "quantity": 1
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("sells the item and returns authoritative balances", function() {
          expect(res.status).to.equal(200);
          expect(res.body.character.inventory.items).to.be.an("array");
          expect(res.body.character.penya).to.be.a("number");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
