info:
  name: Delete a character after name confirmation
  type: http
  seq: 3
  tags:
    - Characters

http:
  method: DELETE
  url: "{{baseUrl}}/api/characters/:characterId"
  params:
    - name: characterId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "name": "FlarisHero"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: Character deleted
    request:
      url: "{{baseUrl}}/api/characters/:characterId"
      method: DELETE
      params:
        - name: characterId
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "name": "FlarisHero"
          }
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Invalid request body or parameters
    request:
      url: "{{baseUrl}}/api/characters/:characterId"
