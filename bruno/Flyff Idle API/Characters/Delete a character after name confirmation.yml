info:
  name: Delete a character after name confirmation
  type: http
  seq: 4
  tags:
    - Characters

http:
  method: DELETE
  url: "{{baseUrl}}/api/characters/:characterId?confirmationName={{characterName}}"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
    - name: confirmationName
      value: "{{characterName}}"
      type: query
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("deletes the character without a response body", function() {
          expect(res.status).to.equal(204);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
