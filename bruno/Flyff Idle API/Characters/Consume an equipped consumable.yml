info:
  name: Consume an equipped consumable
  type: http
  seq: 16
  tags:
    - Characters

http:
  method: POST
  url: "{{baseUrl}}/api/characters/:characterId/consumables/:resource/consume"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
    - name: resource
      value: hp
      type: path
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("consumes one loadout item and returns its remaining quantity", function() {
          expect(res.status).to.equal(200);
          expect(res.body.character.consumableLoadout).to.be.an("object");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
