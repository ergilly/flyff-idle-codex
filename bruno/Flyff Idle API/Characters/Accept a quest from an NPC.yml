info:
  name: Accept a quest from an NPC
  type: http
  seq: 14
  tags:
    - Characters

http:
  method: POST
  url: "{{baseUrl}}/api/characters/:characterId/quests"
  params:
    - name: characterId
      value: "{{characterId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "questId": 129,
        "npcId": 29
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("accepts the quest and returns active quest state", function() {
          expect(res.status).to.equal(201);
          expect(res.body.character.activeQuestIds).to.include(129);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
