info:
  name: Login with email and password
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "test@flyff-idle.local",
        "password": "password123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body.token) {
          bru.setEnvVar("token", res.body.token, { persist: true });
        }
    - type: tests
      code: |-
        test("returns an authenticated player session", function() {
          expect(res.status).to.equal(200);
          expect(res.body.token).to.be.a("string").and.not.empty;
          expect(res.body.user).to.be.an("object");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Authenticated player session
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "test@flyff-idle.local",
            "password": "password123"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "",
            "user": {
              "id": "",
              "email": "",
              "displayName": "",
              "isAdmin": false
            }
          }
  - name: 400 Response
    description: Invalid request body or parameters
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "test@flyff-idle.local",
            "password": "password123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 401 Response
    description: Missing or invalid bearer token, or invalid credentials
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "test@flyff-idle.local",
            "password": "password123"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
