info:
  name: Login with email and password
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "test@flyff-idle.local",
        "password": "password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Authenticated player session
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "test@flyff-idle.local",
            "password": "password123"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "",
            "user": {
              "id": "",
              "email": "",
              "displayName": "",
              "isAdmin": false
            }
          }
  - name: 400 Response
    description: Invalid request body or parameters
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "test@flyff-idle.local",
            "password": "password123"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
  - name: 401 Response
    description: Missing or invalid bearer token, or invalid credentials
    request:
      url: "{{baseUrl}}/api/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "test@flyff-idle.local",
            "password": "password123"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
