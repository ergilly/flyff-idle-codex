      type: object
      required:
        - sortBy
      properties:
        sortBy:
          $ref: "#/components/schemas/InventorySortOption"
    AddInventoryItemRequest:
      type: object
      required:
        - itemId
        - quantity
      properties:
        itemId:
          type: string
          pattern: "^\\d+$"
          example: "40"
        quantity:
          type: integer
          minimum: 1
          maximum: 9999
          example: 1
    AddPenyaRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: integer
          minimum: 1
          maximum: 2147483647
    LootInventoryRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            required:
              - itemId
              - quantity
            properties:
              itemId:
                type: string
                pattern: "^\\d+$"
              quantity:
                type: integer
                minimum: 1
                maximum: 9999
    EquipConsumableRequest:
      type: object
