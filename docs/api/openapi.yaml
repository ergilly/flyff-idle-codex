openapi: 3.0.3
info:
  title: Flyff Idle API
  version: 0.1.0
  description: API schema for auth, characters, inventory, admin actions, and game data.
servers:
  - url: http://localhost:4000
tags:
  - name: Health
    description: Service availability.
  - name: Auth
    description: Player registration and authentication.
  - name: Characters
    description: Character lifecycle, progression, inventory, equipment, and consumables.
  - name: Admin
    description: Administrative character support operations.
  - name: Game Data
    description: Cacheable read-only Flyff reference data.
  - name: Items
    description: Indexed item metadata used by authenticated gameplay clients.
  - name: Bank
    description: Player bank reads and transfers scoped through an owned character.
  - name: Shops
    description: Town shop catalogs and character purchase or sale commands.
  - name: Travel
    description: Server-validated character travel commands.
  - name: Images
    description: Cached image proxy for approved Flyff image categories.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: API status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Create a player profile
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/characters:
    get:
      tags:
        - Characters
      summary: List characters for the authenticated player
      operationId: listCharacters
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Character roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Characters
      summary: Create a character in an open roster slot
      operationId: createCharacter
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Character slot already occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/characters/{characterId}:
    get:
      tags:
        - Characters
      summary: Get one character owned by the authenticated player
      operationId: getCharacter
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      responses:
        "200":
          description: Character details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Characters
      summary: Delete a character after name confirmation
      operationId: deleteCharacter
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - in: query
          name: confirmationName
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        "204":
          description: Character deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/progression/stat-allocations:
    post:
      tags:
        - Characters
      summary: Allocate available character stat points
      operationId: allocateCharacterStats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatAllocationRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/DomainRuleFailed"
  /api/characters/{characterId}/progression/skill-allocations:
    post:
      tags:
        - Characters
      summary: Allocate available character skill points
      operationId: allocateCharacterSkills
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillAllocationRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/DomainRuleFailed"
  /api/characters/{characterId}/progression/battle-state:
    put:
      tags:
        - Characters
      summary: Replace the persisted progression state from the client-simulated battle system
      operationId: replaceCharacterBattleState
      description: This is an idempotent persistence boundary for the current client-simulated battle implementation. It is not an authoritative battle-resolution endpoint.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleProgressionStateRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/quests:
    post:
      tags:
        - Characters
      summary: Accept a quest offered by an NPC
      operationId: acceptCharacterQuest
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptQuestRequest"
      responses:
        "201":
          description: Quest accepted and updated character returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/DomainRuleFailed"
  /api/characters/{characterId}/quests/{questId}:
    delete:
      tags:
        - Characters
      summary: Abandon an active character quest
      operationId: abandonCharacterQuest
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - in: path
          name: questId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Quest abandoned and updated character returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/quests/{questId}/complete:
    post:
      tags:
        - Characters
      summary: Complete an active item-collection quest at its ending NPC
      operationId: completeCharacterQuest
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - in: path
          name: questId
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteQuestRequest"
      responses:
        "200":
          description: Quest completed, rewards applied, and updated character returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/DomainRuleFailed"
  /api/characters/{characterId}/inventory/{slotIndex}/equip:
    post:
      tags:
        - Characters
      summary: Equip an inventory item into an equipment set
      operationId: equipCharacterItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/SlotIndexPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentSetRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/move:
    post:
      tags:
        - Characters
      summary: Move, swap, or stack inventory items
      operationId: moveCharacterInventoryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveInventoryItemRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/sort:
    post:
      tags:
        - Characters
      summary: Sort a character inventory
      operationId: sortCharacterInventory
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SortInventoryRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/equipment/{equipmentSlot}/unequip:
    post:
      tags:
        - Characters
      summary: Unequip an item from an equipment set
      operationId: unequipCharacterItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/EquipmentSlotPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentSetRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/{slotIndex}/consume:
    post:
      tags:
        - Characters
      summary: Consume an item directly from an inventory slot
      operationId: consumeCharacterInventoryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/SlotIndexPath"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/loot:
    post:
      tags:
        - Characters
      summary: Add awarded loot to a character inventory
      operationId: addCharacterLoot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LootInventoryRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/equipment/ammo/consume:
    post:
      tags:
        - Characters
      summary: Consume one arrow from an equipment set
      operationId: consumeCharacterAmmo
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentSetRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/consumables/{resource}:
    post:
      tags:
        - Characters
      summary: Equip or clear a character consumable slot
      operationId: setCharacterConsumable
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/ConsumableResourcePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipConsumableRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/consumables/{resource}/consume:
    post:
      tags:
        - Characters
      summary: Consume one item from a character consumable slot
      operationId: consumeCharacterConsumable
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/ConsumableResourcePath"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/shops/{townMapId}/{locationId}/purchases:
    post:
      tags:
        - Shops
      summary: Purchase an item from a town shop
      operationId: purchaseTownShopItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/TownMapIdPath"
        - $ref: "#/components/parameters/LocationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopPurchaseRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/shops/sales:
    post:
      tags:
        - Shops
      summary: Sell an item from a character inventory
      operationId: sellCharacterItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopSaleRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/bank:
    get:
      tags:
        - Bank
      summary: Get the authenticated player's bank and selected character
      operationId: getCharacterBank
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      responses:
        "200":
          description: Current bank and character state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankUpdateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/bank/items:
    post:
      tags:
        - Bank
      summary: Transfer one item stack between a character and bank
      operationId: transferBankItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankItemTransferRequest"
      responses:
        "200":
          description: Updated bank and character state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/bank/items/all:
    post:
      tags:
        - Bank
      summary: Transfer all possible item stacks between a character and bank
      operationId: transferAllBankItems
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankAllItemsTransferRequest"
      responses:
        "200":
          description: Updated bank and character state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/bank/penya:
    post:
      tags:
        - Bank
      summary: Transfer Penya between a character and bank
      operationId: transferBankPenya
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankPenyaTransferRequest"
      responses:
        "200":
          description: Updated bank and character state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/travel:
    post:
      tags:
        - Travel
      summary: Travel a character to another region
      operationId: travelCharacter
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/penya:
    post:
      tags:
        - Admin
      summary: Add Penya to a character
      operationId: addCharacterPenya
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPenyaRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/refund-stats:
    post:
      tags:
        - Admin
      summary: Reset a character's stats to their base values
      operationId: refundCharacterStats
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/refund-skills:
    post:
      tags:
        - Admin
      summary: Reset a character's learned skill levels
      operationId: refundCharacterSkills
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/inventory:
    post:
      tags:
        - Admin
      summary: Add an item stack to a character inventory
      operationId: addCharacterInventoryItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInventoryItemRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/data:
    get:
      tags:
        - Game Data
      summary: List JSON-backed data sets
      operationId: listGameDataSets
      responses:
        "200":
          description: Available JSON data sets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetIndexResponse"
  /api/data/{dataSet}:
    get:
      tags:
        - Game Data
      summary: Query a JSON-backed data set
      operationId: queryGameDataSet
      description: Supports the named query parameters plus arbitrary scalar filters, including nested filters such as `location.region`.
      parameters:
        - $ref: "#/components/parameters/DataSetPath"
        - in: query
          name: ids
          schema:
            type: string
          description: Comma-separated record ids.
        - in: query
          name: q
          schema:
            type: string
          description: Text search across id, name, and description.
        - in: query
          name: fields
          schema:
            type: string
          description: Comma-separated top-level fields to include in each result.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: minLevel
          schema:
            type: number
          description: Minimum level, or upgrade level for upgrades.
        - in: query
          name: maxLevel
          schema:
            type: number
          description: Maximum level, or upgrade level for upgrades.
        - in: query
          name: class
          schema:
            type: string
          description: Skill class name filter, for example Mercenary.
        - in: query
          name: classId
          schema:
            type: integer
          description: Skill class id filter.
      responses:
        "200":
          description: Filtered data records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetQueryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/data/{dataSet}/{id}:
    get:
      tags:
        - Game Data
      summary: Get a JSON-backed data record by id
      operationId: getGameDataRecord
      parameters:
        - $ref: "#/components/parameters/DataSetPath"
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetRecordResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/items:
    get:
      tags:
        - Items
      summary: Get indexed item metadata by ids
      operationId: getItemsByIds
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: ids
          required: true
          schema:
            type: string
          description: Comma-separated numeric item ids. At most 50 ids per request.
          example: 40,3497,3314
      responses:
        "200":
          description: Item metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/shops/{townMapId}/{locationId}:
    get:
      tags:
        - Shops
      summary: Get a town shop and its enriched item metadata
      operationId: getTownShop
      parameters:
        - $ref: "#/components/parameters/TownMapIdPath"
        - $ref: "#/components/parameters/LocationIdPath"
      responses:
        "200":
          description: Town shop inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/images/{category}/{filename}:
    get:
      tags:
        - Images
      summary: Get a cached Flyff image
      operationId: getCachedImage
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
            enum:
              - item
              - monster
              - skill
        - in: path
          name: filename
          required: true
          schema:
            type: string
            maxLength: 160
            pattern: "^[a-zA-Z0-9._-]+$"
      responses:
        "200":
          description: Cached image bytes
          headers:
            Cache-Control:
              schema:
                type: string
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          description: The upstream image could not be loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /swagger:
    get:
      tags:
        - Game Data
      summary: Open Swagger UI for the API
      operationId: getSwaggerUi
      responses:
        "200":
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string
components:
  parameters:
    CharacterIdPath:
      in: path
      name: characterId
      required: true
      schema:
        type: string
    SlotIndexPath:
      in: path
      name: slotIndex
      required: true
      schema:
        type: integer
        minimum: 0
        maximum: 99
    EquipmentSlotPath:
      in: path
      name: equipmentSlot
      required: true
      schema:
        $ref: "#/components/schemas/CharacterEquipmentSlot"
    DataSetPath:
      in: path
      name: dataSet
      required: true
      schema:
        $ref: "#/components/schemas/DataSetName"
    ConsumableResourcePath:
      in: path
      name: resource
      required: true
      schema:
        $ref: "#/components/schemas/CharacterConsumableResource"
    TownMapIdPath:
      in: path
      name: townMapId
      required: true
      schema:
        type: string
    LocationIdPath:
      in: path
      name: locationId
      required: true
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid bearer token, or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: The authenticated user is not permitted to perform the operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: The operation failed unexpectedly
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainRuleFailed:
      description: The request was valid but violates a domain rule
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: test@flyff-idle.local
        password:
          type: string
          minLength: 8
          example: password123
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/LoginRequest"
        - type: object
          required:
            - displayName
          properties:
            displayName:
              type: string
              minLength: 2
              maxLength: 32
              example: Flaris Founder
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - displayName
        - isAdmin
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        isAdmin:
          type: boolean
    CharacterListResponse:
      type: object
      required:
        - characters
      properties:
        characters:
          type: array
          items:
            $ref: "#/components/schemas/Character"
    CharacterResponse:
      type: object
      required:
        - character
      properties:
        character:
          $ref: "#/components/schemas/Character"
    CreateCharacterRequest:
      type: object
      required:
        - slotIndex
        - name
        - gender
      properties:
        slotIndex:
          type: integer
          minimum: 0
          maximum: 7
          example: 2
        name:
          type: string
          minLength: 3
          maxLength: 16
          pattern: "^[A-Za-z][A-Za-z0-9 ]*$"
          example: FlarisHero
        gender:
          $ref: "#/components/schemas/CharacterGender"
    StatAllocationRequest:
      type: object
      required:
        - allocations
      properties:
        allocations:
          type: object
          required:
            - str
            - sta
            - dex
            - int
          properties:
            str:
              type: integer
              minimum: 0
              maximum: 984
            sta:
              type: integer
              minimum: 0
              maximum: 984
            dex:
              type: integer
              minimum: 0
              maximum: 984
            int:
              type: integer
              minimum: 0
              maximum: 984
    SkillAllocationRequest:
      type: object
      required:
        - allocations
      properties:
        allocations:
          type: object
          minProperties: 1
          additionalProperties:
            type: integer
            minimum: 1
            maximum: 20
    BattleProgressionStateRequest:
      type: object
      required:
        - exp
        - level
        - penya
      properties:
        exp:
          type: integer
          minimum: 0
        level:
          type: integer
          minimum: 1
          maximum: 170
        penya:
          type: integer
          minimum: 0
    EquipmentSetRequest:
      type: object
      properties:
        equipmentSet:
          type: integer
          minimum: 0
          maximum: 2
          default: 0
    MoveInventoryItemRequest:
      type: object
      required:
        - fromSlotIndex
        - toSlotIndex
