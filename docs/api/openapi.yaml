openapi: 3.0.3
info:
  title: Flyff Idle API
  version: 0.1.0
  description: API schema for auth and player character selection.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/register:
    post:
      summary: Create a player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/characters:
    get:
      summary: List characters for the authenticated player
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Character roster
          content:
            application/json:
              schema:
                type: object
                required:
                  - characters
                properties:
                  characters:
                    type: array
                    items:
                      $ref: "#/components/schemas/Character"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a character in an open roster slot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                type: object
                required:
                  - character
                properties:
                  character:
                    $ref: "#/components/schemas/Character"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Character slot already occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/characters/{characterId}:
    delete:
      summary: Delete a character after name confirmation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: characterId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteCharacterRequest"
      responses:
        "204":
          description: Character deleted
        "400":
          description: Missing or mismatched name confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Character not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/data:
    get:
      summary: List JSON-backed data sets
      responses:
        "200":
          description: Available JSON data sets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetIndexResponse"
  /api/data/{dataSet}:
    get:
      summary: Query a JSON-backed data set
      parameters:
        - $ref: "#/components/parameters/DataSetPath"
        - in: query
          name: ids
          schema:
            type: string
          description: Comma-separated record ids.
        - in: query
          name: q
          schema:
            type: string
          description: Text search across id, name, and description.
        - in: query
          name: fields
          schema:
            type: string
          description: Comma-separated fields to include in each result.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: minLevel
          schema:
            type: number
          description: Minimum level, or upgrade level for upgrades.
        - in: query
          name: maxLevel
          schema:
            type: number
          description: Maximum level, or upgrade level for upgrades.
        - in: query
          name: class
          schema:
            type: string
          description: Skill class name filter, for example Mercenary.
        - in: query
          name: classId
          schema:
            type: integer
          description: Skill class id filter.
      responses:
        "200":
          description: Filtered data records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetQueryResponse"
        "404":
          description: Data set not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/data/{dataSet}/{id}:
    get:
      summary: Get a JSON-backed data record by id
      parameters:
        - $ref: "#/components/parameters/DataSetPath"
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetRecordResponse"
        "404":
          description: Data set or record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    DataSetPath:
      in: path
      name: dataSet
      required: true
      schema:
        type: string
        enum:
          - items
          - jobs
          - monsters
          - sets
          - skills
          - upgrades
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: test@flyff-idle.local
        password:
          type: string
          minLength: 8
          example: password123
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/LoginRequest"
        - type: object
          required:
            - displayName
          properties:
            displayName:
              type: string
              minLength: 2
              maxLength: 32
              example: Flaris Founder
    LoginResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - displayName
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
    CreateCharacterRequest:
      type: object
      required:
        - slotIndex
        - name
        - gender
      properties:
        slotIndex:
          type: integer
          minimum: 0
          maximum: 7
          example: 2
        name:
          type: string
          minLength: 3
          maxLength: 16
          pattern: "^[A-Za-z][A-Za-z0-9 ]*$"
          example: FlarisHero
        gender:
          $ref: "#/components/schemas/CharacterGender"
    DeleteCharacterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          example: FlarisHero
    Character:
      type: object
      required:
        - id
        - slotIndex
        - name
        - gender
        - job
        - level
        - exp
        - penya
        - stats
        - equipment
        - inventory
      properties:
        id:
          type: string
        slotIndex:
          type: integer
          minimum: 0
          maximum: 7
        name:
          type: string
        gender:
          $ref: "#/components/schemas/CharacterGender"
        job:
          type: string
        level:
          type: integer
          minimum: 1
        exp:
          type: integer
          minimum: 0
        penya:
          type: integer
          minimum: 0
        stats:
          $ref: "#/components/schemas/CharacterStats"
        equipment:
          $ref: "#/components/schemas/CharacterEquipment"
        inventory:
          $ref: "#/components/schemas/CharacterInventory"
    CharacterStats:
      type: object
      required:
        - str
        - sta
        - dex
        - int
      properties:
        str:
          type: integer
          minimum: 0
          example: 15
        sta:
          type: integer
          minimum: 0
          example: 15
        dex:
          type: integer
          minimum: 0
          example: 15
        int:
          type: integer
          minimum: 0
          example: 15
    CharacterEquipment:
      type: object
      required:
        - helmet
        - suit
        - gloves
        - boots
        - flying
        - csBoots
        - csGloves
        - csSuit
        - csHelm
        - mask
        - cloak
        - ammo
        - offhand
        - mainhand
        - ringR
        - earringR
        - necklace
        - earringL
        - ringL
      properties:
        helmet:
          type: string
          nullable: true
        suit:
          type: string
          nullable: true
        gloves:
          type: string
          nullable: true
        boots:
          type: string
          nullable: true
        flying:
          type: string
          nullable: true
        csBoots:
          type: string
          nullable: true
        csGloves:
          type: string
          nullable: true
        csSuit:
          type: string
          nullable: true
        csHelm:
          type: string
          nullable: true
        mask:
          type: string
          nullable: true
        cloak:
          type: string
          nullable: true
        ammo:
          type: string
          nullable: true
        offhand:
          type: string
          nullable: true
        mainhand:
          type: string
          nullable: true
        ringR:
          type: string
          nullable: true
        earringR:
          type: string
          nullable: true
        necklace:
          type: string
          nullable: true
        earringL:
          type: string
          nullable: true
        ringL:
          type: string
          nullable: true
    CharacterInventory:
      type: object
      required:
        - size
        - items
      properties:
        size:
          type: integer
          minimum: 1
          example: 50
        items:
          type: array
          items:
            $ref: "#/components/schemas/CharacterInventoryItem"
    CharacterInventoryItem:
      type: object
      required:
        - slotIndex
        - itemId
        - quantity
      properties:
        slotIndex:
          type: integer
          minimum: 0
        itemId:
          type: string
        quantity:
          type: integer
          minimum: 1
    CharacterGender:
      type: string
      enum:
        - male
        - female
    DataSetIndexResponse:
      type: object
      required:
        - dataSets
      properties:
        dataSets:
          type: array
          items:
            type: object
            required:
              - name
              - href
            properties:
              name:
                type: string
                enum:
                  - items
                  - jobs
                  - monsters
                  - sets
                  - skills
                  - upgrades
              href:
                type: string
                example: /api/data/skills
    DataSetQueryResponse:
      type: object
      required:
        - dataSet
        - total
        - limit
        - offset
        - results
      properties:
        dataSet:
          type: string
          example: skills
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        results:
          type: array
          items:
            type: object
            additionalProperties: true
    DataSetRecordResponse:
      type: object
      required:
        - dataSet
        - item
      properties:
        dataSet:
          type: string
          example: jobs
        item:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
