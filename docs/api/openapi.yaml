openapi: 3.0.3
info:
  title: Flyff Idle API
  version: 0.1.0
  description: API schema for auth, characters, inventory, admin actions, and game data.
servers:
  - url: http://localhost:4000
tags:
  - name: Health
  - name: Auth
  - name: Characters
  - name: Admin
  - name: Game Data
  - name: Items
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      responses:
        "200":
          description: API status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Create a player profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created player session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/characters:
    get:
      tags:
        - Characters
      summary: List characters for the authenticated player
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Character roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Characters
      summary: Create a character in an open roster slot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharacterRequest"
      responses:
        "201":
          description: Created character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Character slot already occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/characters/{characterId}:
    delete:
      tags:
        - Characters
      summary: Delete a character after name confirmation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteCharacterRequest"
      responses:
        "204":
          description: Character deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/progression:
    patch:
      tags:
        - Characters
      summary: Update character stats or learned skill levels
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCharacterProgressionRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/{slotIndex}/equip:
    post:
      tags:
        - Characters
      summary: Equip an inventory item into an equipment set
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/SlotIndexPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentSetRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/move:
    post:
      tags:
        - Characters
      summary: Move, swap, or stack inventory items
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveInventoryItemRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/inventory/sort:
    post:
      tags:
        - Characters
      summary: Sort a character inventory
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SortInventoryRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/characters/{characterId}/equipment/{equipmentSlot}/unequip:
    post:
      tags:
        - Characters
      summary: Unequip an item from an equipment set
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
        - $ref: "#/components/parameters/EquipmentSlotPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipmentSetRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/refund-stats:
    post:
      tags:
        - Admin
      summary: Reset a character's stats to their base values
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/refund-skills:
    post:
      tags:
        - Admin
      summary: Reset a character's learned skill levels
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/admin/characters/{characterId}/inventory:
    post:
      tags:
        - Admin
      summary: Add an item stack to a character inventory
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CharacterIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddInventoryItemRequest"
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/data:
    get:
      tags:
        - Game Data
      summary: List JSON-backed data sets
      responses:
        "200":
          description: Available JSON data sets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetIndexResponse"
  /api/data/{dataSet}:
    get:
      tags:
        - Game Data
      summary: Query a JSON-backed data set
      description: Supports the named query parameters plus arbitrary scalar filters, including nested filters such as `location.region`.
      parameters:
        - $ref: "#/components/parameters/DataSetPath"
        - in: query
          name: ids
          schema:
            type: string
          description: Comma-separated record ids.
        - in: query
          name: q
          schema:
            type: string
          description: Text search across id, name, and description.
        - in: query
          name: fields
          schema:
            type: string
          description: Comma-separated top-level fields to include in each result.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: minLevel
          schema:
            type: number
          description: Minimum level, or upgrade level for upgrades.
        - in: query
          name: maxLevel
          schema:
            type: number
          description: Maximum level, or upgrade level for upgrades.
        - in: query
          name: class
          schema:
            type: string
          description: Skill class name filter, for example Mercenary.
        - in: query
          name: classId
          schema:
            type: integer
          description: Skill class id filter.
      responses:
        "200":
          description: Filtered data records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetQueryResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/data/{dataSet}/{id}:
    get:
      tags:
        - Game Data
      summary: Get a JSON-backed data record by id
      parameters:
        - $ref: "#/components/parameters/DataSetPath"
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataSetRecordResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/items:
    get:
      tags:
        - Items
      summary: Get indexed item metadata by ids
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: ids
          required: true
          schema:
            type: string
          description: Comma-separated numeric item ids. At most 50 ids per request.
          example: 40,3497,3314
      responses:
        "200":
          description: Item metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /swagger:
    get:
      tags:
        - Game Data
      summary: Open Swagger UI for the API
      responses:
        "200":
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string
components:
  parameters:
    CharacterIdPath:
      in: path
      name: characterId
      required: true
      schema:
        type: string
    SlotIndexPath:
      in: path
      name: slotIndex
      required: true
      schema:
        type: integer
        minimum: 0
        maximum: 99
    EquipmentSlotPath:
      in: path
      name: equipmentSlot
      required: true
      schema:
        $ref: "#/components/schemas/CharacterEquipmentSlot"
    DataSetPath:
      in: path
      name: dataSet
      required: true
      schema:
        $ref: "#/components/schemas/DataSetName"
  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid bearer token, or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user is not an admin
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: test@flyff-idle.local
        password:
          type: string
          minLength: 8
          example: password123
    RegisterRequest:
      allOf:
        - $ref: "#/components/schemas/LoginRequest"
        - type: object
          required:
            - displayName
          properties:
            displayName:
              type: string
              minLength: 2
              maxLength: 32
              example: Flaris Founder
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      required:
        - id
        - email
        - displayName
        - isAdmin
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        isAdmin:
          type: boolean
    CharacterListResponse:
      type: object
      required:
        - characters
      properties:
        characters:
          type: array
          items:
            $ref: "#/components/schemas/Character"
    CharacterResponse:
      type: object
      required:
        - character
      properties:
        character:
          $ref: "#/components/schemas/Character"
    CreateCharacterRequest:
      type: object
      required:
        - slotIndex
        - name
        - gender
      properties:
        slotIndex:
          type: integer
          minimum: 0
          maximum: 7
          example: 2
        name:
          type: string
          minLength: 3
          maxLength: 16
          pattern: "^[A-Za-z][A-Za-z0-9 ]*$"
          example: FlarisHero
        gender:
          $ref: "#/components/schemas/CharacterGender"
    DeleteCharacterRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          example: FlarisHero
    UpdateCharacterProgressionRequest:
      type: object
      description: At least one of `stats` or `skillLevels` is required.
      minProperties: 1
      properties:
        stats:
          $ref: "#/components/schemas/CharacterStats"
        skillLevels:
          $ref: "#/components/schemas/CharacterSkillLevels"
    EquipmentSetRequest:
      type: object
      properties:
        equipmentSet:
          type: integer
          minimum: 0
          maximum: 2
          default: 0
    MoveInventoryItemRequest:
      type: object
      required:
        - fromSlotIndex
        - toSlotIndex
      properties:
        fromSlotIndex:
          type: integer
          minimum: 0
          maximum: 99
        toSlotIndex:
          type: integer
          minimum: 0
          maximum: 99
    SortInventoryRequest:
      type: object
      required:
        - sortBy
      properties:
        sortBy:
          $ref: "#/components/schemas/InventorySortOption"
    AddInventoryItemRequest:
      type: object
      required:
        - itemId
        - quantity
      properties:
        itemId:
          type: string
          pattern: "^\\d+$"
          example: "40"
        quantity:
          type: integer
          minimum: 1
          maximum: 9999
          example: 1
    Character:
      type: object
      required:
        - id
        - slotIndex
        - name
        - gender
        - job
        - progressionRank
        - level
        - exp
        - penya
        - stats
        - skillLevels
        - equipment
        - equipmentSets
        - inventory
      properties:
        id:
          type: string
        slotIndex:
          type: integer
          minimum: 0
          maximum: 7
        name:
          type: string
        gender:
          $ref: "#/components/schemas/CharacterGender"
        job:
          type: string
        progressionRank:
          $ref: "#/components/schemas/CharacterProgressionRank"
        level:
          type: integer
          minimum: 1
        exp:
          type: integer
          minimum: 0
        penya:
          type: integer
          minimum: 0
        stats:
          $ref: "#/components/schemas/CharacterStats"
        skillLevels:
          $ref: "#/components/schemas/CharacterSkillLevels"
        equipment:
          $ref: "#/components/schemas/CharacterEquipment"
        equipmentSets:
          type: array
          minItems: 3
          maxItems: 3
          items:
            $ref: "#/components/schemas/CharacterEquipment"
        inventory:
          $ref: "#/components/schemas/CharacterInventory"
    CharacterGender:
      type: string
      enum:
        - male
        - female
    CharacterProgressionRank:
      type: string
      enum:
        - normal
        - master
        - hero
    CharacterStats:
      type: object
      required:
        - str
        - sta
        - dex
        - int
      properties:
        str:
          type: integer
          minimum: 15
          maximum: 999
          example: 15
        sta:
          type: integer
          minimum: 15
          maximum: 999
          example: 15
        dex:
          type: integer
          minimum: 15
          maximum: 999
          example: 15
        int:
          type: integer
          minimum: 15
          maximum: 999
          example: 15
    CharacterSkillLevels:
      type: object
      additionalProperties:
        type: integer
        minimum: 0
        maximum: 20
      example:
        vagrant-clean-hit: 1
    CharacterEquipment:
      type: object
      required:
        - helmet
        - suit
        - gloves
        - boots
        - flying
        - csBoots
        - csGloves
        - csSuit
        - csHelm
        - mask
        - cloak
        - ammo
        - offhand
        - mainhand
        - ringR
        - earringR
        - necklace
        - earringL
        - ringL
      properties:
        helmet:
          type: string
          nullable: true
        suit:
          type: string
          nullable: true
        gloves:
          type: string
          nullable: true
        boots:
          type: string
          nullable: true
        flying:
          type: string
          nullable: true
        csBoots:
          type: string
          nullable: true
        csGloves:
          type: string
          nullable: true
        csSuit:
          type: string
          nullable: true
        csHelm:
          type: string
          nullable: true
        mask:
          type: string
          nullable: true
        cloak:
          type: string
          nullable: true
        ammo:
          type: string
          nullable: true
        offhand:
          type: string
          nullable: true
        mainhand:
          type: string
          nullable: true
        ringR:
          type: string
          nullable: true
        earringR:
          type: string
          nullable: true
        necklace:
          type: string
          nullable: true
        earringL:
          type: string
          nullable: true
        ringL:
          type: string
          nullable: true
    CharacterEquipmentSlot:
      type: string
      enum:
        - helmet
        - suit
        - gloves
        - boots
        - flying
        - csBoots
        - csGloves
        - csSuit
        - csHelm
        - mask
        - cloak
        - ammo
        - offhand
        - mainhand
        - ringR
        - earringR
        - necklace
        - earringL
        - ringL
    CharacterInventory:
      type: object
      required:
        - size
        - items
      properties:
        size:
          type: integer
          minimum: 1
          example: 50
        items:
          type: array
          items:
            $ref: "#/components/schemas/CharacterInventoryItem"
    CharacterInventoryItem:
      type: object
      required:
        - slotIndex
        - itemId
        - quantity
      properties:
        slotIndex:
          type: integer
          minimum: 0
        itemId:
          type: string
        quantity:
          type: integer
          minimum: 1
    InventorySortOption:
      type: string
      enum:
        - name
        - level
        - job
        - category
    ItemListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItemMetadata"
    ItemMetadata:
      type: object
      required:
        - id
        - name
        - description
        - icon
        - category
        - subcategory
        - rarity
        - level
        - sex
        - requiredJob
        - minAttack
        - maxAttack
        - attackSpeed
        - twoHanded
        - minDefense
        - maxDefense
        - abilities
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        subcategory:
          type: string
          nullable: true
        rarity:
          type: string
          nullable: true
        level:
          type: integer
          nullable: true
        sex:
          type: string
          nullable: true
        requiredJob:
          type: string
          nullable: true
        minAttack:
          type: number
          nullable: true
        maxAttack:
          type: number
          nullable: true
        attackSpeed:
          type: string
          nullable: true
        twoHanded:
          type: boolean
          nullable: true
        minDefense:
          type: number
          nullable: true
        maxDefense:
          type: number
          nullable: true
        cooldown:
          type: number
          nullable: true
        stack:
          type: integer
          nullable: true
        consumable:
          type: boolean
          nullable: true
        abilities:
          type: array
          items:
            $ref: "#/components/schemas/ItemAbility"
    ItemAbility:
      type: object
      required:
        - parameter
        - add
        - rate
      properties:
        parameter:
          type: string
        add:
          type: number
          nullable: true
        rate:
          type: boolean
    DataSetName:
      type: string
      enum:
        - items
        - jobs
        - mapMonsters
        - monsters
        - sets
        - skills
        - upgrades
    DataSetIndexResponse:
      type: object
      required:
        - dataSets
      properties:
        dataSets:
          type: array
          items:
            type: object
            required:
              - name
              - href
            properties:
              name:
                $ref: "#/components/schemas/DataSetName"
              href:
                type: string
                example: /api/data/skills
    DataSetQueryResponse:
      type: object
      required:
        - dataSet
        - total
        - limit
        - offset
        - results
      properties:
        dataSet:
          $ref: "#/components/schemas/DataSetName"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        results:
          type: array
          items:
            type: object
            additionalProperties: true
    DataSetRecordResponse:
      type: object
      required:
        - dataSet
        - item
      properties:
        dataSet:
          $ref: "#/components/schemas/DataSetName"
        item:
          type: object
          additionalProperties: true
    ErrorResponse:
