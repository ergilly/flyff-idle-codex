name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit
        env:
          CI: true

      - name: Build production application
        run: npm run build

  deploy:
    name: Deploy to Oracle VM
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Configure production SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          : "${SSH_PRIVATE_KEY:?Missing PRODUCTION_SSH_PRIVATE_KEY}"
          : "${SSH_KNOWN_HOSTS:?Missing PRODUCTION_SSH_KNOWN_HOSTS}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/production
          chmod 600 ~/.ssh/production
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy latest main revision
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
        run: |
          : "${PRODUCTION_HOST:?Missing PRODUCTION_HOST}"
          : "${PRODUCTION_USER:?Missing PRODUCTION_USER}"
          ssh \
            -i ~/.ssh/production \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$PRODUCTION_USER@$PRODUCTION_HOST" \
            'sudo -n chown -R flyff-idle:flyff-idle /opt/flyff-idle &&
             sudo -n -u flyff-idle env HOME=/home/flyff-idle git -C /opt/flyff-idle fetch origin main &&
             sudo -n -u flyff-idle env HOME=/home/flyff-idle git -C /opt/flyff-idle reset --hard origin/main &&
             sudo -n -u flyff-idle env HOME=/home/flyff-idle git -C /opt/flyff-idle clean -fd &&
             sudo -n install -m 0755 /opt/flyff-idle/deploy/ubuntu/deploy.sh /usr/local/sbin/flyff-idle-deploy &&
             sudo -n /usr/local/sbin/flyff-idle-deploy'
